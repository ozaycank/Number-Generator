<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Number Generator</h1>
    <h2>Author: Can KIRLI</h2>
    <div id="legend-container">
        <div class="legend-item"><span class="box even"></span> <span>Even (Çift)</span></div>
        <div class="legend-item"><span class="box odd"></span> <span>Odd (Tek)</span></div>
        <div class="legend-item"><span class="box prime"></span> <span>Prime (Asal)</span></div>
    </div>
    <input type="number" id="numberInput" placeholder="Enter Number">
    <button id="generateBtn">Generate Numbers</button>
    <ul id="numberList"></ul>
    <script src="script.js"></script>
</body>

</html>
